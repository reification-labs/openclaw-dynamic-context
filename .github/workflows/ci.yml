name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx tsx --test engine.test.ts

  ui-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python3 -m py_compile ui/context-ui.py
      - run: python3 -m py_compile -m doctest ui/context-ui.py 2>/dev/null || true
